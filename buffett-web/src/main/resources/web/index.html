<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGI·BUFFETT — 量化终端</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="scanlines"></div>

  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <span class="brand-name">AGI·BUFFETT</span>
      <span class="brand-sub">// VALUE TERMINAL</span>
    </div>
    <div class="topbar-right">
      <span class="status"><i class="dot"></i> LIVE · 本地</span>
      <span id="clock" class="clock mono">--:--:--</span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="panel-title">自选股 / WATCHLIST
        <button id="wl-add-btn" class="wl-add-btn" title="添加自选">＋</button>
      </div>
      <form id="wl-add-form" class="wl-add-form" hidden>
        <input id="wl-sym" class="wl-input" placeholder="代码 如 600519 / 00700 / AAPL" autocomplete="off" />
        <div class="wl-row">
          <select id="wl-mkt" class="wl-input">
            <option value="A">A股</option><option value="HK">港股</option><option value="US">美股</option>
          </select>
          <input id="wl-name" class="wl-input" placeholder="名称(可选)" autocomplete="off" />
        </div>
        <div class="wl-row">
          <select id="wl-group" class="wl-input"></select>
          <button type="submit" class="wl-submit">添加</button>
        </div>
        <div id="wl-add-msg" class="wl-msg"></div>
      </form>
      <div id="group-tabs" class="group-tabs"></div>
      <div id="stock-list" class="stock-list"></div>
      <div class="sidebar-foot mono" id="wl-updated"></div>
    </aside>

    <section class="content">
      <div id="detail" class="detail">
        <div class="empty mono">◂ 选择左侧标的查看基本面</div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
